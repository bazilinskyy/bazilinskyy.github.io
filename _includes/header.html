<!-- Theme init: runs synchronously before first paint to prevent flash of wrong theme -->
<script>
  (function () {
    var saved = localStorage.getItem('theme');
    
    // 1. Check if user previously toggled manually
    // 2. Otherwise, check if OS/Browser prefers light mode
    // 3. Default to dark if neither is specified
    var preferred = saved ? saved : 
                    (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

    document.documentElement.setAttribute('data-theme', preferred);
  }());
</script>

<nav class="navbar navbar-default navbar-fixed-top">
  <div class="container-fluid">
    <div class="navbar-header">
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-collapse-1" aria-controls="navbar-collapse-1" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
        <span class="sr-only">Toggle navigation</span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
        <span class="icon-bar"></span>
      </button>
      <a class="navbar-brand" href="{{ site.url }}{{ site.baseurl }}/">{{ site.title | escape }}</a>
    </div>
    <div class="collapse navbar-collapse" id="navbar-collapse-1">
      <ul class="nav navbar-nav navbar-right">
        <li><a href="{{ site.url }}{{ site.baseurl }}/">Home</a></li>
        {% for page in site.nav_pages %}
          <li><a href="{{ site.url }}{{ site.baseurl }}/{{page.name}}">{{page.name | capitalize }}</a></li>
        {% endfor %}
        <li>
          <button id="theme-toggle" aria-label="Toggle light/dark mode">
            <span id="theme-toggle-icon">☾</span>
            <span id="theme-toggle-label">Dark</span>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<script>
  (function () {
    var btn   = document.getElementById('theme-toggle');
    var icon  = document.getElementById('theme-toggle-icon');
    var label = document.getElementById('theme-toggle-label');

    /* Inside your existing script at the bottom of header.html */
    function updateButton(theme) {
      /* This ensures the icon matches the current theme applied by the Init script */
      if (theme === 'dark') {
        icon.textContent  = '☀'; // Show Sun because clicking will switch to Light
        label.textContent = 'Light';
      } else {
        icon.textContent  = '☾'; // Show Moon because clicking will switch to Dark
        label.textContent = 'Dark';
      }
    }

    // Keep the sync call as it is:
    updateButton(document.documentElement.getAttribute('data-theme') || 'dark');

    btn.addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateButton(next);
    });
  }());
</script>
